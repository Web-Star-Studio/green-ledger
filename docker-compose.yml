services:
  postgres:
    image: postgres:16-alpine
    container_name: greenledger-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-greenledger}
      POSTGRES_USER: ${POSTGRES_USER:-greenledger}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-greenledger}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-greenledger} -d ${POSTGRES_DB:-greenledger}"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
